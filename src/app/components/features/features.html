<section id="features" class="min-h-screen bg-slate-900 text-white py-20">

  <div class="max-w-6xl mx-auto px-4 text-center">

    <h2 class="text-3xl font-bold mb-12">
      Features That Level You Up
    </h2>

    <div class="grid md:grid-cols-3 gap-8">

      <!-- Card 1 -->
      <div class="p-6 bg-slate-800 rounded-xl hover:-translate-y-2 hover:shadow-2xl transition duration-300">
        <lucide-icon [img]="Music" class="w-10 h-10 mx-auto mb-4 text-sky-400"></lucide-icon>
        <h3 class="text-xl font-semibold mb-3">Skill Tracking</h3>
        <p class="text-sm opacity-70">
          Track your music progress and see how you grow over time.
        </p>
      </div>

      <!-- Card 2 -->
      <div class="p-6 bg-slate-800 rounded-xl hover:-translate-y-2 hover:shadow-2xl transition duration-300">
        <lucide-icon [img]="Trophy" class="w-10 h-10 mx-auto mb-4 text-sky-400"></lucide-icon>
        <h3 class="text-xl font-semibold mb-3">Leaderboard</h3>
        <p class="text-sm opacity-70">
          Compete with others and climb to the top ranks.
        </p>
      </div>

      <!-- Card 3 -->
      <div class="p-6 bg-slate-800 rounded-xl hover:-translate-y-2 hover:shadow-2xl transition duration-300">
        <lucide-icon [img]="User" class="w-10 h-10 mx-auto mb-4 text-sky-400"></lucide-icon>
        <h3 class="text-xl font-semibold mb-3">Profile Showcase</h3>
        <p class="text-sm opacity-70">
          Show your identity and let others discover your talent.
        </p>
      </div>

    </div>

  </div>

</section>
